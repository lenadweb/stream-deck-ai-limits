<!DOCTYPE html>
<html>

<head lang="en">
    <title>Codex Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .info {
            padding: 8px 16px;
            font-size: 11px;
            color: #999;
            line-height: 1.4;
        }
        .link {
            color: #4285F4;
            cursor: pointer;
            text-decoration: underline;
        }
        .link:hover {
            color: #357ae8;
        }
    </style>
</head>

<body>
    <div class="info">Credentials for Codex/ChatGPT are automatically loaded from your system (~/.codex/auth.json).</div>
    <div class="info">Found a bug? <span class="link" onclick="openGitHub()">Contribute on GitHub</span></div>

    <script>
        let _websocket = null;
        let _uuid = null;

        function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
            _uuid = uuid;
            _websocket = new WebSocket("ws://127.0.0.1:" + port);

            _websocket.onopen = function () {
                _websocket.send(JSON.stringify({ event: registerEvent, uuid: uuid }));
            };
        }

        function openGitHub() {
            if (_websocket) {
                _websocket.send(JSON.stringify({
                    event: "openUrl",
                    payload: {
                        url: "https://github.com/lenadweb/stream-deck-ai-limits"
                    }
                }));
            }
        }
    </script>
</body>

</html>
