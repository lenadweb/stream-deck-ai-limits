<!DOCTYPE html>
<html>

<head lang="en">
    <title>MiniMax Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .hint {
            padding: 4px 16px;
            font-size: 11px;
            color: #999;
        }
        .link {
            color: #4285F4;
            cursor: pointer;
            text-decoration: underline;
        }
        .link:hover {
            color: #357ae8;
        }
    </style>
</head>

<body>
    <sdpi-item label="API Key">
        <sdpi-textfield id="apiKey" type="password" placeholder="MiniMax API key"></sdpi-textfield>
    </sdpi-item>

    <div class="hint">This value is stored in the action settings and used for MiniMax API requests.</div>
    <div class="hint">Found a bug? <span class="link" onclick="openGitHub()">Contribute on GitHub</span></div>

    <script>
        let _websocket = null;
        let _uuid = null;
        let _settings = {};

        function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
            _uuid = uuid;

            if (actionInfo) {
                const parsed = JSON.parse(actionInfo);
                _settings = parsed?.payload?.settings || {};
            }

            _websocket = new WebSocket("ws://127.0.0.1:" + port);

            _websocket.onopen = function () {
                _websocket.send(JSON.stringify({ event: registerEvent, uuid: uuid }));
                applySettings();
            };

            _websocket.onmessage = function (evt) {
                const data = JSON.parse(evt.data);
                if (data.event === "didReceiveSettings") {
                    _settings = data.payload?.settings || {};
                    applySettings();
                }
            };
        }

        function applySettings() {
            const apiKey = document.getElementById("apiKey");
            apiKey.value = _settings.apiKey || "";
        }

        function saveSettings() {
            const apiKey = document.getElementById("apiKey");
            _settings.apiKey = apiKey.value || "";

            if (_websocket && _uuid) {
                _websocket.send(JSON.stringify({
                    event: "setSettings",
                    context: _uuid,
                    payload: _settings,
                }));
            }
        }

        function openGitHub() {
            if (_websocket) {
                _websocket.send(JSON.stringify({
                    event: "openUrl",
                    payload: {
                        url: "https://github.com/lenadweb/stream-deck-ai-limits"
                    }
                }));
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            const apiKey = document.getElementById("apiKey");
            apiKey.addEventListener("input", saveSettings);
            applySettings();
        });
    </script>
</body>

</html>
